name: QA Vercel Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vercel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Static QA
        run: npm run qa:static

      - name: Vercel Smoke QA
        env:
          QA_BASE_URL: https://myungni-jinro.vercel.app
        run: npm run qa:vercel

